<!DOCTYPE html>
<html>
<!--HEAD-->

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width" />
    <title>Project 9 Functions</title>
    <link rel="stylesheet" type="text/css" href="CSS/main.css">
</head>

<!--BODY-->

<body>
    <section>
        <h1>-----Section I-----</h1>
        <div>
            <h3>-----Set Timer-----</h3>
            <p>How many seconds would you like to set your alarm for?</p>
            <input id="seconds" value="" />
            <button onclick="countdown()">Click here</button>
            <p id="timer"></p>
        </div>
        
    </section>
    <section>
        <h1>-----Section II-----</h1>
        <!--Slideshow container-->
        <div class="slideshow-container">
            <!--Full-width images with number and caption text-->
            <div class="mySlides fade">
                <div class="numbertext">1 / 3</div>
                <img src="images/car1.jpg" style="width:100%">
                <div class="text bluetextshadow">Blue Car</div>
            </div>

             <div class="mySlides fade">
                <div class="numbertext">2 / 3</div>
                <img src="images/car2.jpg" style="width:100%">
                <div class="text blacktextshadow">Black Car</div>
            </div>

             <div class="mySlides fade">
                <div class="numbertext">3 / 3</div>
                <img src="images/car3.jpg" style="width:100%">
                <div class="text redtextshadow">Red Car</div>
            </div>

            <!--Next and Previous Buttons-->
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
        <br>

        <!--Dots/Circles-->
        <div style="text-align: center;">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
    </section>

    <script src="JS/main.js"></script>
</body>

</html>
